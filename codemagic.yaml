workflows:
  build-python-app:
    name: Buildozer Android APK
    # Codemagic ka standard Linux server use karenge
    instance_type: linux
    environment:
      python: 3.14
    scripts:
      - name: Install system dependencies for Buildozer
        script: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      
      - name: Install Buildozer & Cython
        script: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK using Buildozer
        script: |
          # 'yes' command isliye lagaya hai taaki Android SDK licenses auto-accept ho jayein
          yes | buildozer android debug
          
    artifacts:
      # Build hone ke baad APK 'bin' folder mein aayegi, use save kar lenge
      - bin/*.apk
      
